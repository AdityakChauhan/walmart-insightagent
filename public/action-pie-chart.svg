<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    
    <filter id="pieShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="10" y="10" width="380" height="230" rx="12" fill="url(#cardGradient)" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Header -->
  <text x="30" y="35" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Action Distribution</text>
  <text x="30" y="55" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">Breakdown of AI recommendations by type</text>
  
  <!-- Pie Chart -->
  <g id="pie-chart" transform="translate(200, 130)" filter="url(#pieShadow)">
    <!-- Donate slice (45%) -->
    <path d="M 0 0 L 0 -60 A 60 60 0 0 1 42.43 -42.43 Z" fill="#22c55e"/>
    <!-- Markdown -30% slice (25%) -->
    <path d="M 0 0 L 42.43 -42.43 A 60 60 0 0 1 60 0 Z" fill="#f59e0b"/>
    <!-- Markdown -10% slice (20%) -->
    <path d="M 0 0 L 60 0 A 60 60 0 0 1 42.43 42.43 Z" fill="#3b82f6"/>
    <!-- Return slice (10%) -->
    <path d="M 0 0 L 42.43 42.43 A 60 60 0 0 1 0 60 Z" fill="#ef4444"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="20" fill="white"/>
    
    <!-- Center text -->
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Total</text>
    <text x="0" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">100%</text>
  </g>
  
  <!-- Legend -->
  <g id="legend" transform="translate(30, 80)">
    <!-- Donate -->
    <rect x="0" y="0" width="16" height="16" fill="#22c55e" rx="3"/>
    <text x="25" y="12" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">Donate</text>
    <text x="25" y="25" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#22c55e" font-weight="600">45%</text>
    
    <!-- Markdown -30% -->
    <rect x="0" y="35" width="16" height="16" fill="#f59e0b" rx="3"/>
    <text x="25" y="47" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">Markdown -30%</text>
    <text x="25" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f59e0b" font-weight="600">25%</text>
    
    <!-- Markdown -10% -->
    <rect x="0" y="70" width="16" height="16" fill="#3b82f6" rx="3"/>
    <text x="25" y="82" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">Markdown -10%</text>
    <text x="25" y="95" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="600">20%</text>
    
    <!-- Return -->
    <rect x="0" y="105" width="16" height="16" fill="#ef4444" rx="3"/>
    <text x="25" y="117" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">Return</text>
    <text x="25" y="130" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ef4444" font-weight="600">10%</text>
  </g>
  
  <!-- Summary Stats -->
  <g id="summary" transform="translate(280, 80)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Summary:</text>
    <text x="0" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">• Donate: Most effective</text>
    <text x="0" y="35" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">• Markdowns: 45% combined</text>
    <text x="0" y="50" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">• Returns: Minimal usage</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="200" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="350" cy="200" r="2" fill="#f59e0b" opacity="0.3"/>
  <circle cx="200" cy="220" r="2" fill="#3b82f6" opacity="0.3"/>
</svg> 