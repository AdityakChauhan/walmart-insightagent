<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="10" y="10" width="180" height="100" rx="12" fill="url(#cardGradient)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Icon -->
  <g id="leaf-icon" transform="translate(160, 25)">
    <circle cx="0" cy="0" r="12" fill="url(#iconGradient)"/>
    <!-- Leaf shape -->
    <path d="M -6 -8 Q 0 -12 6 -8 Q 8 -4 6 0 Q 4 4 0 6 Q -4 4 -6 0 Q -8 -4 -6 -8 Z" fill="white"/>
    <!-- Leaf vein -->
    <path d="M 0 -8 L 0 4" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Title -->
  <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Total CO₂ Saved</text>
  
  <!-- Main Value -->
  <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#22c55e">4,230</text>
  <text x="20" y="85" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">kg</text>
  
  <!-- Trend Indicator -->
  <g id="trend" transform="translate(20, 95)">
    <path d="M 0 0 L 4 -4 L 8 0" stroke="#22c55e" stroke-width="2" fill="none"/>
    <text x="12" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#22c55e">+15%</text>
    <text x="12" y="12" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280">vs last period</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="50" r="2" fill="#22c55e" opacity="0.3"/>
  <circle cx="170" cy="80" r="1.5" fill="#22c55e" opacity="0.2"/>
</svg> 