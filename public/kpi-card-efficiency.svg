<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#faf5ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="10" y="10" width="180" height="100" rx="12" fill="url(#cardGradient)" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Icon -->
  <g id="award-icon" transform="translate(160, 25)">
    <circle cx="0" cy="0" r="12" fill="url(#iconGradient)"/>
    <!-- Award/trophy shape -->
    <path d="M -6 -6 L -6 4 L -4 6 L 4 6 L 6 4 L 6 -6 L 4 -8 L -4 -8 Z" fill="white"/>
    <!-- Award handle -->
    <rect x="-2" y="6" width="4" height="2" fill="white"/>
    <!-- Star -->
    <path d="M 0 -4 L 1 -2 L 3 -2 L 1.5 -1 L 2 1 L 0 0 L -2 1 L -1.5 -1 L -3 -2 L -1 -2 Z" fill="white"/>
  </g>
  
  <!-- Title -->
  <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Efficiency Score</text>
  
  <!-- Main Value -->
  <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#8b5cf6">87%</text>
  
  <!-- Trend Indicator -->
  <g id="trend" transform="translate(20, 95)">
    <path d="M 0 0 L 4 -4 L 8 0" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <text x="12" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b5cf6">+5%</text>
    <text x="12" y="12" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280">vs last period</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="50" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="170" cy="80" r="1.5" fill="#8b5cf6" opacity="0.2"/>
</svg> 