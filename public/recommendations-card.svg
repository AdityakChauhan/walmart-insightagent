<?xml version="1.0" encoding="UTF-8"?>
<svg width="350" height="200" viewBox="0 0 350 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eff6ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="10" y="10" width="330" height="180" rx="12" fill="url(#cardGradient)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Header -->
  <g id="header" transform="translate(30, 30)">
    <circle cx="0" cy="0" r="10" fill="url(#iconGradient)"/>
    <!-- Target icon -->
    <circle cx="0" cy="0" r="6" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="#3b82f6"/>
    <text x="20" y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Recommendations</text>
  </g>
  
  <!-- Recommendations List -->
  <g id="recommendations-list" transform="translate(30, 60)">
    <!-- Recommendation 1: Dairy optimization -->
    <g id="rec-1">
      <circle cx="0" cy="0" r="3" fill="#22c55e"/>
      <text x="15" y="5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Focus on dairy optimization</text>
      <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Implement stricter expiry monitoring for dairy</text>
    </g>
    
    <!-- Recommendation 2: Produce donations -->
    <g id="rec-2" transform="translate(0, 35)">
      <circle cx="0" cy="0" r="3" fill="#3b82f6"/>
      <text x="15" y="5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Increase produce donations</text>
      <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Partner with more local food banks</text>
    </g>
    
    <!-- Recommendation 3: Markdown timing -->
    <g id="rec-3" transform="translate(0, 70)">
      <circle cx="0" cy="0" r="3" fill="#f59e0b"/>
      <text x="15" y="5" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Optimize markdown timing</text>
      <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">Apply markdowns 2-3 days before expiry</text>
    </g>
  </g>
  
  <!-- Priority Indicator -->
  <g id="priority" transform="translate(30, 160)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#374151">Priority Level:</text>
    <rect x="0" y="5" width="200" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="0" y="5" width="180" height="8" rx="4" fill="#3b82f6"/>
    <text x="210" y="12" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">High</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="100" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="300" cy="120" r="1.5" fill="#22c55e" opacity="0.3"/>
  <circle cx="280" cy="80" r="1.5" fill="#f59e0b" opacity="0.3"/>
</svg> 