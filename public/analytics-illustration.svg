<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Chart patterns -->
    <pattern id="gridPattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Header Section -->
  <g id="header">
    <rect x="40" y="30" width="720" height="80" rx="12" fill="url(#cardGradient)" stroke="#e2e8f0" stroke-width="2"/>
    <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#1e293b">Sustainability Analytics</text>
    <text x="60" y="85" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">Comprehensive insights into your environmental impact and performance</text>
    
    <!-- Time Range Selector -->
    <rect x="650" y="45" width="90" height="40" rx="8" fill="white" stroke="#d1d5db" stroke-width="1"/>
    <text x="665" y="65" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#374151">Last 7 days</text>
    <polygon points="720,70 725,75 720,80" fill="#6b7280"/>
  </g>
  
  <!-- KPI Cards -->
  <g id="kpi-cards">
    <!-- CO₂ Saved Card -->
    <g id="co2-card">
      <rect x="40" y="140" width="170" height="100" rx="12" fill="white" stroke="#22c55e" stroke-width="2"/>
      <text x="55" y="165" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Total CO₂ Saved</text>
      <circle cx="190" cy="155" r="8" fill="url(#greenGradient)"/>
      <path d="M 185 150 L 190 155 L 195 150 M 190 155 L 190 160" stroke="white" stroke-width="2" fill="none"/>
      <text x="55" y="185" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#22c55e">4,230 kg</text>
      <text x="55" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">+15% vs last period</text>
    </g>
    
    <!-- Water Saved Card -->
    <g id="water-card">
      <rect x="230" y="140" width="170" height="100" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
      <text x="245" y="165" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Water Saved</text>
      <circle cx="370" cy="155" r="8" fill="url(#blueGradient)"/>
      <path d="M 365 150 Q 370 145 375 150 Q 370 155 365 150" stroke="white" stroke-width="2" fill="none"/>
      <text x="245" y="185" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#3b82f6">12,450 L</text>
      <text x="245" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">+12% vs last period</text>
    </g>
    
    <!-- Meals Saved Card -->
    <g id="meals-card">
      <rect x="420" y="140" width="170" height="100" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
      <text x="435" y="165" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Meals Saved</text>
      <circle cx="560" cy="155" r="8" fill="url(#orangeGradient)"/>
      <path d="M 555 150 L 560 155 L 565 150 M 555 155 L 565 155" stroke="white" stroke-width="2" fill="none"/>
      <text x="435" y="185" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b">8,920</text>
      <text x="435" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">+18% vs last period</text>
    </g>
    
    <!-- Efficiency Score Card -->
    <g id="efficiency-card">
      <rect x="610" y="140" width="150" height="100" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
      <text x="625" y="165" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#374151">Efficiency Score</text>
      <circle cx="740" cy="155" r="8" fill="url(#purpleGradient)"/>
      <path d="M 735 150 L 740 155 L 745 150 M 735 155 L 745 155" stroke="white" stroke-width="2" fill="none"/>
      <text x="625" y="185" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#8b5cf6">87%</text>
      <text x="625" y="205" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">+5% vs last period</text>
    </g>
  </g>
  
  <!-- Charts Section -->
  <g id="charts-section">
    <!-- CO₂ Trend Chart -->
    <g id="co2-trend-chart">
      <rect x="40" y="270" width="360" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <text x="55" y="295" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">CO₂ Savings Trend</text>
      <text x="55" y="315" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">Daily CO₂ emissions prevented vs target</text>
      
      <!-- Chart Area -->
      <rect x="55" y="330" width="330" height="120" fill="url(#gridPattern)"/>
      
      <!-- Chart Lines -->
      <path d="M 55 420 L 85 390 L 115 405 L 145 360 L 175 375 L 205 330 L 235 345 L 265 360 L 295 375 L 325 390 L 355 405 L 385 420" 
            stroke="#22c55e" stroke-width="3" fill="none"/>
      <path d="M 55 420 L 85 420 L 115 420 L 145 420 L 175 420 L 205 420 L 235 420 L 265 420 L 295 420 L 325 420 L 355 420 L 385 420" 
            stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
      
      <!-- Area Fill -->
      <path d="M 55 420 L 85 390 L 115 405 L 145 360 L 175 375 L 205 330 L 235 345 L 265 360 L 295 375 L 325 390 L 355 405 L 385 420 L 385 420 L 55 420 Z" 
            fill="#22c55e" fill-opacity="0.2"/>
      
      <!-- X-axis labels -->
      <text x="55" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Mon</text>
      <text x="85" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Tue</text>
      <text x="115" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Wed</text>
      <text x="145" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Thu</text>
      <text x="175" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Fri</text>
      <text x="205" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Sat</text>
      <text x="235" y="470" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Sun</text>
    </g>
    
    <!-- Action Distribution Pie Chart -->
    <g id="action-pie-chart">
      <rect x="420" y="270" width="360" height="200" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
      <text x="435" y="295" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Action Distribution</text>
      <text x="435" y="315" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">Breakdown of AI recommendations by type</text>
      
      <!-- Pie Chart -->
      <g transform="translate(600, 370)">
        <!-- Donate slice (45%) -->
        <path d="M 0 0 L 0 -60 A 60 60 0 0 1 42.43 -42.43 Z" fill="#22c55e"/>
        <!-- Markdown -30% slice (25%) -->
        <path d="M 0 0 L 42.43 -42.43 A 60 60 0 0 1 60 0 Z" fill="#f59e0b"/>
        <!-- Markdown -10% slice (20%) -->
        <path d="M 0 0 L 60 0 A 60 60 0 0 1 42.43 42.43 Z" fill="#3b82f6"/>
        <!-- Return slice (10%) -->
        <path d="M 0 0 L 42.43 42.43 A 60 60 0 0 1 0 60 Z" fill="#ef4444"/>
        
        <!-- Center circle -->
        <circle cx="0" cy="0" r="20" fill="white"/>
      </g>
      
      <!-- Legend -->
      <g transform="translate(435, 400)">
        <rect x="0" y="0" width="12" height="12" fill="#22c55e" rx="2"/>
        <text x="20" y="10" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">Donate 45%</text>
        
        <rect x="0" y="20" width="12" height="12" fill="#f59e0b" rx="2"/>
        <text x="20" y="30" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">Markdown -30% 25%</text>
        
        <rect x="0" y="40" width="12" height="12" fill="#3b82f6" rx="2"/>
        <text x="20" y="50" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">Markdown -10% 20%</text>
        
        <rect x="0" y="60" width="12" height="12" fill="#ef4444" rx="2"/>
        <text x="20" y="70" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">Return 10%</text>
      </g>
    </g>
  </g>
  
  <!-- Category Impact Bar Chart -->
  <g id="category-impact-chart">
    <rect x="40" y="500" width="740" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="55" y="525" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Impact by Category</text>
    <text x="55" y="545" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748b">Environmental impact breakdown by product category</text>
    
    <!-- Bar Chart -->
    <g transform="translate(55, 560)">
      <!-- Dairy -->
      <rect x="0" y="-30" width="40" height="30" fill="#22c55e"/>
      <rect x="0" y="-15" width="40" height="15" fill="#3b82f6"/>
      <rect x="0" y="-5" width="40" height="10" fill="#f59e0b"/>
      <text x="20" y="10" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Dairy</text>
      
      <!-- Produce -->
      <rect x="60" y="-25" width="40" height="25" fill="#22c55e"/>
      <rect x="60" y="-20" width="40" height="20" fill="#3b82f6"/>
      <rect x="60" y="-8" width="40" height="8" fill="#f59e0b"/>
      <text x="80" y="10" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Produce</text>
      
      <!-- Baked Goods -->
      <rect x="120" y="-20" width="40" height="20" fill="#22c55e"/>
      <rect x="120" y="-12" width="40" height="12" fill="#3b82f6"/>
      <rect x="120" y="-4" width="40" height="4" fill="#f59e0b"/>
      <text x="140" y="10" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Baked</text>
      
      <!-- Meat -->
      <rect x="180" y="-18" width="40" height="18" fill="#22c55e"/>
      <rect x="180" y="-10" width="40" height="10" fill="#3b82f6"/>
      <rect x="180" y="-3" width="40" height="3" fill="#f59e0b"/>
      <text x="200" y="10" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Meat</text>
      
      <!-- Beverages -->
      <rect x="240" y="-12" width="40" height="12" fill="#22c55e"/>
      <rect x="240" y="-8" width="40" height="8" fill="#3b82f6"/>
      <rect x="240" y="-2" width="40" height="2" fill="#f59e0b"/>
      <text x="260" y="10" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Beverages</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(320, 560)">
      <rect x="0" y="-10" width="12" height="8" fill="#22c55e"/>
      <text x="20" y="-2" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">CO₂</text>
      
      <rect x="0" y="0" width="12" height="8" fill="#3b82f6"/>
      <text x="20" y="8" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Water</text>
      
      <rect x="0" y="10" width="12" height="8" fill="#f59e0b"/>
      <text x="20" y="18" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Meals</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g id="decorative">
    <!-- Floating data points -->
    <circle cx="100" cy="100" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="200" cy="80" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="300" cy="120" r="2" fill="#f59e0b" opacity="0.6"/>
    <circle cx="400" cy="90" r="3" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="500" cy="110" r="2" fill="#22c55e" opacity="0.6"/>
    <circle cx="600" cy="85" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="700" cy="105" r="3" fill="#f59e0b" opacity="0.6"/>
    
    <!-- Connection lines -->
    <path d="M 100 100 L 200 80 L 300 120 L 400 90 L 500 110 L 600 85 L 700 105" 
          stroke="#e2e8f0" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
</svg> 